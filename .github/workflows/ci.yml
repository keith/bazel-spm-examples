name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly: Wednesday 7:00am PST (15:00 UTC).
    - cron: "0 15 * * 3"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: Apple platforms
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-macos
          repository-cache: true
      - run: bazel test //...

  linux:
    name: Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2.4.0
        with:
          swift-version: "6.2"
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-linux
          repository-cache: true
      - run: which swiftc
      - run: swiftc --version
      - run: bazel test //...
