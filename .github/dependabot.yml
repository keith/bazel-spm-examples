version: 2

updates:
  # Bazel module dependencies resolved from the Bazel Central Registry.
  - package-ecosystem: "bazel"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      bazel-modules:
        patterns:
          - "*"

  # Actions referenced by the workflows in .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # https://github.com/swift-actions/setup-swift/issues/798
      - dependency-name: "swift-actions/setup-swift"
    groups:
      github-actions:
        patterns:
          - "*"

  # Swift package dependencies from Package.swift / Package.resolved.
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      swift-packages:
        patterns:
          - "*"
